<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Should you use OpenClaw?</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f0d;
    --surface: #111812;
    --surface2: #161e18;
    --border: rgba(255,255,255,0.07);
    --border-mid: rgba(255,255,255,0.12);
    --text: #e8ede9;
    --text-muted: #7a8c7d;
    --text-dim: #3d4f40;
    --green: #22c97a;
    --green-dim: rgba(34,201,122,0.12);
    --green-border: rgba(34,201,122,0.35);
    --blue: #5b9ef5;
    --blue-dim: rgba(91,158,245,0.1);
    --blue-border: rgba(91,158,245,0.3);
    --amber: #f0a94a;
    --amber-dim: rgba(240,169,74,0.1);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  .shell {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 48px;
  }

  /* Header */
  .hdr {
    padding: 32px 0 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
  }
  .hdr-left {}
  .hdr-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hdr-title {
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
  }
  .hdr-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 8px;
  }
  .pip {
    width: 28px;
    height: 3px;
    border-radius: 2px;
    background: var(--border-mid);
    transition: background 0.4s;
  }
  .pip.done { background: var(--green); }
  .pip.active { background: rgba(34,201,122,0.45); }

  /* Main content area */
  .main {
    display: flex;
    align-items: center;
    padding: 24px 0;
    overflow: hidden;
  }
  .content {
    width: 100%;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Breadcrumb */
  .bc {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    margin-bottom: 20px;
    min-height: 20px;
  }
  .bc-item {
    font-size: 12px;
    color: var(--text-dim);
    max-width: 220px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bc-sep { font-size: 12px; color: var(--text-dim); }

  /* Question */
  .q-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  .q-text {
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 32px;
    max-width: 680px;
  }
  .q-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 800px;
  }
  .q-options.single-col { grid-template-columns: 1fr; max-width: 560px; }
  .q-options.three-col { grid-template-columns: 1fr 1fr 1fr; }

  .opt-btn {
    background: var(--surface);
    border: 0.5px solid var(--border-mid);
    border-radius: 12px;
    padding: 18px 20px;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }
  .opt-btn:hover {
    background: var(--surface2);
    border-color: rgba(34,201,122,0.3);
    transform: translateY(-1px);
  }
  .opt-btn:active { transform: translateY(0); }
  .opt-main { font-size: 15px; font-weight: 400; line-height: 1.4; margin-bottom: 4px; }
  .opt-sub { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

  /* Outcome */
  .outcome-wrap {
    max-width: 720px;
  }
  .outcome-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  .badge-claw { background: var(--green-dim); color: var(--green); border: 0.5px solid var(--green-border); }
  .badge-other { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 0.5px solid var(--border-mid); }
  .badge-both { background: var(--blue-dim); color: var(--blue); border: 0.5px solid var(--blue-border); }

  .outcome-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .dot-claw { background: var(--green); }
  .dot-other { background: var(--text-muted); }
  .dot-both { background: var(--blue); }

  .outcome-tool {
    font-size: 42px;
    font-weight: 500;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .tool-claw { color: var(--green); }
  .tool-other { color: var(--text); }
  .tool-both { color: var(--blue); }

  .outcome-why {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 28px;
    max-width: 580px;
  }
  .outcome-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 36px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 100px;
    border: 0.5px solid var(--border-mid);
    color: var(--text-muted);
  }
  .tag-claw { border-color: var(--green-border); color: var(--green); }
  .tag-both { border-color: var(--blue-border); color: var(--blue); }

  .restart-btn {
    background: transparent;
    border: 0.5px solid var(--border-mid);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, color 0.15s;
  }
  .restart-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* Footer */
  .ftr {
    padding: 0 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ftr-left {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }
  .ftr-right {
    font-size: 12px;
    color: var(--text-dim);
  }
  .ftr-esc {
    display: inline-block;
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    margin-right: 4px;
  }

  /* Keyboard hint */
  .kbd-hint {
    display: flex;
    gap: 6px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border: 0.5px solid var(--border-mid);
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .kbd-label { font-size: 12px; color: var(--text-dim); align-self: center; }
</style>
</head>
<body>

<div class="shell">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-tag">AI Architect Program · Season 2</div>
      <div class="hdr-title">Should you use OpenClaw?</div>
      <div class="hdr-sub">Answer 5 questions — get a specific recommendation.</div>
    </div>
    <div class="progress-wrap" id="pips"></div>
  </div>

  <div class="main">
    <div class="content" id="content"></div>
  </div>

  <div class="ftr">
    <div class="ftr-left">openclaw.ai &nbsp;·&nbsp; docs.openclaw.ai</div>
    <div class="ftr-right"><span class="ftr-esc">ESC</span> to restart</div>
  </div>
</div>

<script>
const tree = {
  q1: {
    step: 1, label: "Goal",
    text: "What's your primary goal right now?",
    cols: 2,
    options: [
      { main: "Automate recurring tasks on a schedule", sub: "Daily briefings, email triage, reminders, reports", next: "q2a" },
      { main: "Build or ship software", sub: "Writing, debugging, coding, PRs, scripts", next: "q2b" },
      { main: "Explore and prototype with AI", sub: "Test prompts, chatbot POCs, API experiments", next: "q2c" },
      { main: "Personal AI that runs 24/7 and takes action", sub: "Manages inbox, calendar, research — while I sleep", next: "q2d" }
    ]
  },
  q2a: {
    step: 2, label: "Automation type",
    text: "Do your automations always follow a fixed, predictable sequence?",
    cols: 1,
    options: [
      { main: "Yes — same steps every time, no judgment needed", sub: "Pull data, send message, log result", next: "q3a_fixed" },
      { main: "No — the agent needs to adapt, decide, or handle exceptions", sub: "Read my emails and decide what needs a reply", next: "q3a_adaptive" }
    ]
  },
  q2b: {
    step: 2, label: "Coding workflow",
    text: "Where do you do most of your coding work?",
    cols: 1,
    options: [
      { main: "In an IDE — VS Code, JetBrains, etc.", sub: "I want AI embedded directly in my editor", next: "out_cursor" },
      { main: "In the terminal / CLI", sub: "I prefer command-line workflows", next: "out_claudecode" },
      { main: "Remotely — I want to trigger coding tasks from my phone", sub: "Text 'fix the failing tests' and get a report back", next: "out_claw_code" }
    ]
  },
  q2c: {
    step: 2, label: "Prototype target",
    text: "What are you prototyping on?",
    cols: 1,
    options: [
      { main: "Gemini / Google models specifically", sub: "Free tier, Google ecosystem, generous rate limits", next: "out_aistudio" },
      { main: "Any model — I want to stay flexible", sub: "Don't want to be locked into one provider", next: "q3c" },
      { main: "Enterprise agents on Google Cloud", sub: "Production-scale, governed, GCP-native", next: "out_vertex" }
    ]
  },
  q2d: {
    step: 2, label: "Data control",
    text: "How important is it that your data stays on your own machine?",
    cols: 1,
    options: [
      { main: "Critical — nothing leaves my hardware", sub: "Privacy, compliance, or strong personal preference", next: "q3d_private" },
      { main: "Flexible — managed hosting is fine if it's simpler", sub: "I'd rather not manage servers", next: "q3d_managed" }
    ]
  },
  q3a_fixed: {
    step: 3, label: "Integration scope",
    text: "Do you need the workflow to connect to many different apps?",
    cols: 1,
    options: [
      { main: "Yes — lots of integrations, visual builder preferred", sub: "Gmail + Sheets + Slack + Notion + Airtable", next: "out_n8n" },
      { main: "No — simple trigger-action, or I'm comfortable with code", sub: "", next: "out_n8n_simple" }
    ]
  },
  q3a_adaptive: {
    step: 3, label: "Proactivity",
    text: "Does it need to run proactively — without you triggering it each time?",
    cols: 1,
    options: [
      { main: "Yes — running in the background on a schedule", sub: "Monitor my inbox every 30 min and act autonomously", next: "q4a" },
      { main: "No — I'll trigger it manually when I need it", sub: "Just handle the task intelligently when called", next: "out_llm_direct" }
    ]
  },
  q3c: {
    step: 3, label: "Session vs. persistent",
    text: "Does the prototype need to run persistently, or just in a session?",
    cols: 1,
    options: [
      { main: "Just a session — test it, iterate, see results", sub: "Still figuring out what I want to build", next: "out_aistudio_any" },
      { main: "Continuously — I want to actually use it, not just demo it", sub: "", next: "q4c" }
    ]
  },
  q3d_private: {
    step: 3, label: "Interface",
    text: "Do you want to control it from WhatsApp, Telegram, or Slack?",
    cols: 1,
    options: [
      { main: "Yes — message it like a person, from my phone", sub: "", next: "out_claw_strong" },
      { main: "No — web dashboard or terminal is fine", sub: "", next: "out_claw_moderate" }
    ]
  },
  q3d_managed: {
    step: 3, label: "Cloud ecosystem",
    text: "Are you already in the Google Cloud ecosystem?",
    cols: 1,
    options: [
      { main: "Yes — GCP, Workspace, Vertex billing in place", sub: "Enterprise setup", next: "out_vertex_personal" },
      { main: "No — I want something simpler to spin up", sub: "", next: "q4d" }
    ]
  },
  q4a: {
    step: 4, label: "Interface",
    text: "Do you want to check in on it from a messaging app?",
    cols: 1,
    options: [
      { main: "Yes — WhatsApp, Telegram, or Slack", sub: "", next: "out_claw_strong" },
      { main: "No — dashboard or CLI is fine", sub: "", next: "out_claw_moderate" }
    ]
  },
  q4c: {
    step: 4, label: "Self-hosting",
    text: "Are you comfortable with a self-hosted setup?",
    cols: 1,
    options: [
      { main: "Yes — I can run things locally or on a VPS", sub: "Node.js, 5-min install", next: "out_claw_strong" },
      { main: "No — I need fully managed, zero infrastructure", sub: "", next: "out_managed" }
    ]
  },
  q4d: {
    step: 4, label: "Self-hosting",
    text: "Are you comfortable running a local process or small VPS?",
    cols: 1,
    options: [
      { main: "Yes — setup doesn't scare me", sub: "Node.js, 5-min install", next: "out_claw_strong" },
      { main: "No — I need fully managed", sub: "", next: "out_managed" }
    ]
  },

  out_claw_strong: { type:"outcome", variant:"claw", tool:"OpenClaw", why:"You need an always-on, self-hosted agent that acts autonomously, works in the messaging apps you already use, and keeps your data on your own hardware. That's exactly what OpenClaw is built for — none of the out-of-the-box tools cover this gap.", tags:["Self-hosted","24/7 runtime","Any model","WhatsApp · Telegram · Slack","Privacy-first"] },
  out_claw_moderate: { type:"outcome", variant:"claw", tool:"OpenClaw", why:"You need an autonomous, persistent agent with real tool access — not just a chat session. OpenClaw fits. You'll use the web dashboard rather than messaging apps, but the always-on runtime and self-hosted model are still the right match.", tags:["Self-hosted","24/7 runtime","Any model","Web dashboard"] },
  out_claw_code: { type:"outcome", variant:"both", tool:"OpenClaw + Claude Code", why:"Use Claude Code for the actual code execution and OpenClaw as the always-on orchestration layer. Text a task from your phone — OpenClaw kicks off the Claude Code loop and reports back when done.", tags:["OpenClaw orchestrates","Claude Code executes","Remote trigger","Async results"] },
  out_cursor: { type:"outcome", variant:"other", tool:"Cursor", why:"You want deep AI assistance embedded directly in your IDE. Cursor is purpose-built for this — real-time suggestions, full codebase context, right where you write. OpenClaw isn't an IDE tool.", tags:["IDE-native","Real-time","Codebase context","Session-based"] },
  out_claudecode: { type:"outcome", variant:"other", tool:"Claude Code", why:"You work in the terminal and want a powerful CLI coding agent. Claude Code is the right fit. You don't need OpenClaw's messaging integration or persistent runtime for focused coding sessions.", tags:["CLI-native","Terminal workflow","Session-based","Anthropic API"] },
  out_aistudio: { type:"outcome", variant:"other", tool:"Google AI Studio", why:"You want fast, free access to Gemini models for prototyping. Google AI Studio is exactly right — generous rate limits, no setup, stateless. Come back to OpenClaw when you're ready to run something persistently.", tags:["Free tier","Gemini models","No setup","Stateless"] },
  out_aistudio_any: { type:"outcome", variant:"other", tool:"Claude.ai / ChatGPT / Gemini", why:"You're in exploration mode — testing prompts, comparing models, building intuition. A direct LLM interface is the simplest answer. Come back to OpenClaw when you know what you want to run 24/7.", tags:["Claude.ai","ChatGPT","Gemini","No commitment","Iterate fast"] },
  out_vertex: { type:"outcome", variant:"other", tool:"Vertex AI Agent Builder", why:"You need enterprise-grade, governed, production-scale agents on GCP. Vertex AI ADK is purpose-built for this — IAM, observability, multi-agent pipelines, global scale. OpenClaw is not the right tool for enterprise cloud deployments.", tags:["GCP-native","Enterprise scale","IAM + governance","Gemini-optimized"] },
  out_vertex_personal: { type:"outcome", variant:"other", tool:"Vertex AI ADK", why:"You're already on GCP and need enterprise-scale agent infrastructure. Vertex ADK fits your stack. OpenClaw is personal and self-hosted — it's not designed to replace enterprise cloud agent platforms.", tags:["GCP ecosystem","Managed scaling","Enterprise governance"] },
  out_n8n: { type:"outcome", variant:"other", tool:"n8n or Zapier", why:"Your workflow is deterministic — same steps every time, no judgment needed, lots of app integrations. n8n or Zapier are the right tools. OpenClaw adds unnecessary complexity when the workflow is fixed.", tags:["Visual builder","Fixed workflows","50+ integrations","No AI reasoning needed"] },
  out_n8n_simple: { type:"outcome", variant:"other", tool:"n8n / Zapier or a script", why:"Simple, fixed automation doesn't need an agent runtime. n8n, Zapier, or a Python cron job will do the job cleanly without the overhead of a full agent stack.", tags:["Lightweight","Fixed steps","Low maintenance"] },
  out_llm_direct: { type:"outcome", variant:"other", tool:"Claude.ai, ChatGPT, or Gemini", why:"You want intelligent task handling triggered manually. A direct LLM interface is the simplest answer — no infrastructure, no persistent runtime, open the app and go.", tags:["No setup","On-demand","Claude.ai","ChatGPT","Gemini"] },
  out_managed: { type:"outcome", variant:"both", tool:"Managed OpenClaw (ClawTank)", why:"You want OpenClaw's capabilities without the self-hosting overhead. Managed options like ClawTank deploy OpenClaw for you — same always-on runtime, zero server management.", tags:["Managed hosting","No DevOps","OpenClaw runtime","clawtank.dev"] }
};

const history = [];
let current = "q1";
let animKey = 0;

function totalSteps(node) {
  return node.step || null;
}

function renderPips(activeStep) {
  const pips = document.getElementById("pips");
  pips.innerHTML = "";
  for (let i = 1; i <= 5; i++) {
    const d = document.createElement("div");
    d.className = "pip" + (i < activeStep ? " done" : i === activeStep ? " active" : "");
    pips.appendChild(d);
  }
}

function render() {
  const node = tree[current];
  const key = ++animKey;

  const content = document.getElementById("content");
  content.style.animation = "none";
  void content.offsetWidth;
  content.style.animation = "";

  if (node.type === "outcome") {
    renderPips(6);
    const tClass = { claw:"tool-claw", other:"tool-other", both:"tool-both" }[node.variant];
    const bClass = { claw:"badge-claw", other:"badge-other", both:"badge-both" }[node.variant];
    const dClass = { claw:"dot-claw", other:"dot-other", both:"dot-both" }[node.variant];
    const lText  = { claw:"Recommendation", other:"Better fit for you", both:"Recommendation" }[node.variant];
    const tagCls = { claw:"tag-claw", other:"", both:"tag-both" }[node.variant];

    content.innerHTML = `
      <div class="bc" id="bc"></div>
      <div class="outcome-wrap">
        <div class="outcome-badge ${bClass}"><span class="outcome-dot ${dClass}"></span>${lText}</div>
        <div class="outcome-tool ${tClass}">${node.tool}</div>
        <div class="outcome-why">${node.why}</div>
        <div class="outcome-tags">${node.tags.map(t=>`<span class="tag ${tagCls}">${t}</span>`).join("")}</div>
        <button class="restart-btn" onclick="restart()">Start over →</button>
      </div>`;
    renderBreadcrumb();
    return;
  }

  renderPips(node.step);
  const colClass = node.cols === 1 ? "single-col" : node.cols === 3 ? "three-col" : "";
  content.innerHTML = `
    <div class="bc" id="bc"></div>
    <div class="q-label">${node.label}</div>
    <div class="q-text">${node.text}</div>
    <div class="q-options ${colClass}">
      ${node.options.map((o,i) => `
        <button class="opt-btn" onclick="choose(${i})">
          <div class="opt-main">${o.main}</div>
          ${o.sub ? `<div class="opt-sub">${o.sub}</div>` : ""}
        </button>`).join("")}
    </div>`;
  renderBreadcrumb();
}

function renderBreadcrumb() {
  const bc = document.getElementById("bc");
  if (!bc || history.length === 0) return;
  bc.innerHTML = history.map((h,i) =>
    `<span class="bc-item">${h.length > 40 ? h.slice(0,40)+"…" : h}</span>${i < history.length-1 ? '<span class="bc-sep"> › </span>' : ""}`
  ).join("") + '<span class="bc-sep"> › </span>';
}

function choose(i) {
  const node = tree[current];
  const opt = node.options[i];
  history.push(opt.main);
  current = opt.next;
  render();
}

function restart() {
  history.length = 0;
  current = "q1";
  render();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") restart();
  const node = tree[current];
  if (!node || node.type === "outcome") return;
  const n = parseInt(e.key);
  if (n >= 1 && n <= node.options.length) choose(n - 1);
});

render();
</script>
</body>
</html>
